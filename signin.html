<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sign in — Wolfgang's Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: #050506;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 75% 20%, rgba(224, 118, 88, 0.18), transparent 55%),
      radial-gradient(circle at 20% 85%, rgba(180, 180, 200, 0.07), transparent 55%);
    filter: blur(40px);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 36px 28px;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #76746E;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #76746E;
    margin-bottom: 8px;
  }
  input[type="email"] {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    color: #FAFAFA;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input[type="email"]:focus {
    border-color: rgba(125,211,252,0.5);
    background: rgba(255,255,255,0.08);
  }
  input[type="email"]::placeholder { color: #4D4B47; }
  button.primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(180deg, #7DD3FC 0%, #5BB5E8 100%);
    color: #021018;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(125,211,252,0.30), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: transform 0.15s, box-shadow 0.18s, filter 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button.primary:hover { transform: translateY(-1px); filter: brightness(1.05); box-shadow: 0 8px 24px rgba(125,211,252,0.40); }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    color: #76746E;
    line-height: 1.5;
  }
  .msg.success { color: #6BE3A4; }
  .msg.error   { color: #FF8A8A; }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    margin: 24px 0 18px;
  }
  .sent-card {
    display: none;
    text-align: center;
  }
  .sent-icon { font-size: 42px; margin-bottom: 14px; }
  .sent-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .sent-sub { font-size: 13px; color: #76746E; line-height: 1.6; }
  .sent-email { color: #7DD3FC; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div id="formView">
    <div class="title">Wolfgang's Dashboard</div>
    <div class="subtitle">Enter your email to get a sign-in link. Works on any device — same email, same data.</div>
    <label for="emailInput">Your email</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" inputmode="email" />
    <button class="primary" id="sendBtn">Send sign-in link</button>
    <div class="msg" id="msgEl"></div>
  </div>
  <div class="sent-card" id="sentView">
    <div class="sent-icon">📬</div>
    <div class="sent-title">Check your email</div>
    <div class="sent-sub">
      We sent a sign-in link to<br>
      <span class="sent-email" id="sentEmail"></span><br><br>
      Tap the link in the email to open your dashboard. It works on this device and any other device you use.
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://cmycjvfegyzhzfxxakpl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6L-ExMekosUH-SotO-hlgg_WKNSKRpW';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
  });

  // If already signed in, go straight to dashboard
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.replace('dashboard.html');
  }

  const emailInput = document.getElementById('emailInput');
  const sendBtn    = document.getElementById('sendBtn');
  const msgEl      = document.getElementById('msgEl');
  const formView   = document.getElementById('formView');
  const sentView   = document.getElementById('sentView');
  const sentEmail  = document.getElementById('sentEmail');

  emailInput.focus();

  async function send() {
    const email = emailInput.value.trim();
    if (!email || !email.includes('@')) {
      msgEl.textContent = 'Please enter a valid email address.';
      msgEl.className = 'msg error';
      return;
    }
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    msgEl.textContent = '';
    msgEl.className = 'msg';

    const redirectTo = window.location.origin + '/dashboard.html';
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: redirectTo },
    });

    if (error) {
      msgEl.textContent = error.message;
      msgEl.className = 'msg error';
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send sign-in link';
    } else {
      formView.style.display = 'none';
      sentEmail.textContent = email;
      sentView.style.display = 'block';
    }
  }

  sendBtn.addEventListener('click', send);
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
