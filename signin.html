<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sign in — Wolfgang's Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: #050506;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 75% 20%, rgba(224, 118, 88, 0.14), transparent 60%),
      radial-gradient(circle at 20% 85%, rgba(180, 180, 200, 0.06), transparent 60%);
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #76746E;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #76746E;
    margin-bottom: 8px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    color: #FAFAFA;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: rgba(125,211,252,0.5); background: rgba(255,255,255,0.08); }
  input::placeholder { color: #4D4B47; }
  button.primary {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    background: linear-gradient(180deg, #7DD3FC 0%, #5BB5E8 100%);
    color: #021018;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(125,211,252,0.30), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: transform 0.15s, filter 0.15s;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    color: #76746E;
    line-height: 1.5;
  }
  .msg.success { color: #6BE3A4; }
  .msg.error   { color: #FF8A8A; }
  .switch-mode {
    margin-top: 16px;
    font-size: 12.5px;
    color: #76746E;
    text-align: center;
  }
  .switch-mode a {
    color: #7DD3FC;
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  .switch-mode a:hover { text-decoration: underline; }

  @media (max-width: 720px) {
    html, body { padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px; }
    .card {
      max-width: 100%;
      padding: 28px 20px;
    }
    .title { font-size: 18px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; margin-bottom: 20px; }
    label { font-size: 10px; margin-top: 12px; }
    input[type="email"],
    input[type="password"] {
      padding: 13px 14px;
      font-size: 16px;
      border-radius: 10px;
      min-height: 44px;
    }
    button.primary {
      padding: 14px;
      margin-top: 16px;
      font-size: 14px;
      min-height: 44px;
      border-radius: 10px;
    }
    .msg { font-size: 12px; margin-top: 12px; }
    .switch-mode { font-size: 12px; margin-top: 14px; }
  }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; }
    .title { font-size: 16px; }
    .subtitle { font-size: 12px; }
    input[type="email"],
    input[type="password"] {
      padding: 12px 12px;
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="title">Wolfgang's Dashboard</div>
  <div class="subtitle" id="subtitleEl">Sign in to sync your data across devices.</div>

  <label for="emailInput">Email</label>
  <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" inputmode="email" />

  <label for="passwordInput">Password</label>
  <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />

  <button class="primary" id="submitBtn">Sign in</button>

  <div class="msg" id="msgEl"></div>

  <div class="switch-mode" id="switchEl">
    Don't have an account? <a id="toggleMode">Create one</a>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://cmycjvfegyzhzfxxakpl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6L-ExMekosUH-SotO-hlgg_WKNSKRpW';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  // Already signed in? Skip to dashboard.
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.replace('dashboard.html');

  const emailInput  = document.getElementById('emailInput');
  const passInput   = document.getElementById('passwordInput');
  const submitBtn   = document.getElementById('submitBtn');
  const msgEl       = document.getElementById('msgEl');
  const subtitleEl  = document.getElementById('subtitleEl');
  const switchEl    = document.getElementById('switchEl');
  const toggleLink  = document.getElementById('toggleMode');

  let mode = 'signin'; // or 'signup'

  function refreshUI() {
    if (mode === 'signin') {
      submitBtn.textContent = 'Sign in';
      subtitleEl.textContent = 'Sign in to sync your data across devices.';
      switchEl.innerHTML = `Don't have an account? <a id="toggleMode">Create one</a>`;
      passInput.setAttribute('autocomplete', 'current-password');
    } else {
      submitBtn.textContent = 'Create account';
      subtitleEl.textContent = 'Pick any email + password. Use the same on every device.';
      switchEl.innerHTML = `Already have an account? <a id="toggleMode">Sign in</a>`;
      passInput.setAttribute('autocomplete', 'new-password');
    }
    document.getElementById('toggleMode').addEventListener('click', () => {
      mode = mode === 'signin' ? 'signup' : 'signin';
      msgEl.textContent = '';
      refreshUI();
    });
  }
  refreshUI();
  emailInput.focus();

  async function submit() {
    const email = emailInput.value.trim();
    const password = passInput.value;
    if (!email || !email.includes('@')) {
      msgEl.textContent = 'Enter a valid email.';
      msgEl.className = 'msg error';
      return;
    }
    if (!password || password.length < 6) {
      msgEl.textContent = 'Password must be at least 6 characters.';
      msgEl.className = 'msg error';
      return;
    }
    submitBtn.disabled = true;
    const originalLabel = submitBtn.textContent;
    submitBtn.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';
    msgEl.textContent = '';
    msgEl.className = 'msg';

    let res;
    if (mode === 'signin') {
      res = await supabase.auth.signInWithPassword({ email, password });
    } else {
      res = await supabase.auth.signUp({ email, password });
    }

    if (res.error) {
      msgEl.textContent = res.error.message || 'Something went wrong.';
      msgEl.className = 'msg error';
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
      return;
    }

    if (mode === 'signup' && !res.data.session) {
      // Email confirmation is enabled in Supabase — user needs to verify
      msgEl.textContent = '✓ Account created. Check your email to confirm, then sign in.';
      msgEl.className = 'msg success';
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
      mode = 'signin';
      refreshUI();
      return;
    }

    msgEl.textContent = '✓ Signed in. Loading…';
    msgEl.className = 'msg success';
    setTimeout(() => window.location.replace('dashboard.html'), 200);
  }

  submitBtn.addEventListener('click', submit);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });
</script>
</body>
</html>
