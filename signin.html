<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sign in — Wolfgang's Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: #050506;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 75% 20%, rgba(224, 118, 88, 0.14), transparent 60%),
      radial-gradient(circle at 20% 85%, rgba(180, 180, 200, 0.06), transparent 60%);
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #76746E;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #76746E;
    margin-bottom: 8px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    color: #FAFAFA;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: rgba(125,211,252,0.5); background: rgba(255,255,255,0.08); }
  input::placeholder { color: #4D4B47; }
  button.primary {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    background: linear-gradient(180deg, #7DD3FC 0%, #5BB5E8 100%);
    color: #021018;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(125,211,252,0.30), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: transform 0.15s, filter 0.15s;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    color: #76746E;
    line-height: 1.5;
  }
  .msg.success { color: #6BE3A4; }
  .msg.error   { color: #FF8A8A; }
  .switch-mode {
    margin-top: 16px;
    font-size: 12.5px;
    color: #76746E;
    text-align: center;
  }
  .switch-mode a {
    color: #7DD3FC;
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  .switch-mode a:hover { text-decoration: underline; }

  @media (max-width: 720px) {
    html, body { padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px; }
    .card {
      max-width: 100%;
      padding: 28px 20px;
    }
    .title { font-size: 18px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; margin-bottom: 20px; }
    label { font-size: 10px; margin-top: 12px; }
    input[type="email"],
    input[type="password"] {
      padding: 13px 14px;
      font-size: 16px;
      border-radius: 10px;
      min-height: 44px;
    }
    button.primary {
      padding: 14px;
      margin-top: 16px;
      font-size: 14px;
      min-height: 44px;
      border-radius: 10px;
    }
    .msg { font-size: 12px; margin-top: 12px; }
    .switch-mode { font-size: 12px; margin-top: 14px; }
  }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; }
    .title { font-size: 16px; }
    .subtitle { font-size: 12px; }
    input[type="email"],
    input[type="password"] {
      padding: 12px 12px;
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="title">Wolfgang's Dashboard</div>
  <div class="subtitle" id="subtitleEl">Sign in to sync your data across devices.</div>

  <label for="emailInput">Email</label>
  <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" inputmode="email" />

  <label for="passwordInput">Password</label>
  <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />

  <button class="primary" id="submitBtn">Sign in</button>

  <div class="msg" id="msgEl"></div>

  <div id="forgotWrap" style="text-align:center;margin-top:10px">
    <a id="forgotLink" style="color:#7DD3FC;text-decoration:none;font-weight:600;font-size:12.5px;cursor:pointer">Forgot password?</a>
  </div>

  <div class="switch-mode" id="switchEl">
    Don't have an account? <a id="toggleMode">Create one</a>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://cmycjvfegyzhzfxxakpl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6L-ExMekosUH-SotO-hlgg_WKNSKRpW';

  // Detect the recovery hash BEFORE Supabase processes & strips it — we
  // need to know if this load is a password-reset click so we don't
  // bounce straight to the dashboard.
  const isRecovery = (window.location.hash || '').includes('type=recovery');

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
  });

  let mode = isRecovery ? 'newpassword' : 'signin'; // signin | signup | reset | newpassword

  // Listen for the recovery event so we definitely catch it even if the
  // hash-detection above misses for any reason.
  supabase.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      mode = 'newpassword';
      msgEl.textContent = '';
      refreshUI();
    }
  });

  // Already signed in? Skip to dashboard — but NOT during a recovery flow.
  if (!isRecovery) {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.replace('dashboard.html');
  }

  const emailInput  = document.getElementById('emailInput');
  const passInput   = document.getElementById('passwordInput');
  const submitBtn   = document.getElementById('submitBtn');
  const msgEl       = document.getElementById('msgEl');
  const subtitleEl  = document.getElementById('subtitleEl');
  const switchEl    = document.getElementById('switchEl');
  const forgotWrap  = document.getElementById('forgotWrap');
  const forgotLink  = document.getElementById('forgotLink');
  const emailLabel  = document.querySelector('label[for="emailInput"]');
  const passLabel   = document.querySelector('label[for="passwordInput"]');

  function refreshUI() {
    // Reset visibility every render so toggling modes works cleanly.
    emailInput.style.display = '';
    passInput.style.display = '';
    emailLabel.style.display = '';
    passLabel.style.display = '';
    forgotWrap.style.display = '';
    switchEl.style.display = '';
    passInput.value = '';

    if (mode === 'signin') {
      submitBtn.textContent = 'Sign in';
      subtitleEl.textContent = 'Sign in to sync your data across devices.';
      switchEl.innerHTML = `Don't have an account? <a id="toggleMode">Create one</a>`;
      passInput.setAttribute('autocomplete', 'current-password');
      passInput.setAttribute('placeholder', '••••••••');
    } else if (mode === 'signup') {
      submitBtn.textContent = 'Create account';
      subtitleEl.textContent = 'Pick any email + password. Use the same on every device.';
      switchEl.innerHTML = `Already have an account? <a id="toggleMode">Sign in</a>`;
      passInput.setAttribute('autocomplete', 'new-password');
      passInput.setAttribute('placeholder', '••••••••');
    } else if (mode === 'reset') {
      submitBtn.textContent = 'Send reset email';
      subtitleEl.textContent = "Enter your email and we'll send a link to set a new password.";
      passInput.style.display = 'none';
      passLabel.style.display = 'none';
      forgotWrap.style.display = 'none';
      switchEl.innerHTML = `Remembered it? <a id="toggleMode">Back to sign in</a>`;
    } else if (mode === 'newpassword') {
      submitBtn.textContent = 'Set new password';
      subtitleEl.textContent = 'Enter a new password for your account.';
      emailInput.style.display = 'none';
      emailLabel.style.display = 'none';
      forgotWrap.style.display = 'none';
      switchEl.style.display = 'none';
      passInput.setAttribute('autocomplete', 'new-password');
      passInput.setAttribute('placeholder', 'New password (min 6 chars)');
      setTimeout(() => passInput.focus(), 50);
    }

    // Re-bind the toggle link each render (innerHTML replaces the node).
    const tl = document.getElementById('toggleMode');
    if (tl) tl.addEventListener('click', () => {
      mode = (mode === 'signin' || mode === 'reset') ? 'signup' : 'signin';
      // From 'reset' specifically, go back to signin (not signup).
      // Handled by the explicit text "Back to sign in" above.
      if (switchEl.textContent.includes('Back to sign in')) mode = 'signin';
      msgEl.textContent = '';
      refreshUI();
    });
  }
  refreshUI();
  if (mode === 'signin') emailInput.focus();

  forgotLink.addEventListener('click', () => {
    mode = 'reset';
    msgEl.textContent = '';
    refreshUI();
    emailInput.focus();
  });

  async function submit() {
    const email = emailInput.value.trim();
    const password = passInput.value;

    // ── Recovery: only password matters ──
    if (mode === 'newpassword') {
      if (!password || password.length < 6) {
        msgEl.textContent = 'Password must be at least 6 characters.';
        msgEl.className = 'msg error';
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      msgEl.textContent = ''; msgEl.className = 'msg';
      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        msgEl.textContent = error.message || 'Could not update password.';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set new password';
        return;
      }
      msgEl.textContent = '✓ Password updated. Signing you in…';
      msgEl.className = 'msg success';
      // Clear the recovery hash before redirecting.
      history.replaceState(null, '', window.location.pathname);
      setTimeout(() => window.location.replace('dashboard.html'), 600);
      return;
    }

    // ── Reset: only email matters ──
    if (mode === 'reset') {
      if (!email || !email.includes('@')) {
        msgEl.textContent = 'Enter a valid email.';
        msgEl.className = 'msg error';
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      msgEl.textContent = ''; msgEl.className = 'msg';
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        // Land back on this same signin page; the recovery hash will
        // flip us into newpassword mode automatically.
        redirectTo: window.location.origin + window.location.pathname,
      });
      if (error) {
        msgEl.textContent = error.message || 'Could not send reset email.';
        msgEl.className = 'msg error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset email';
        return;
      }
      msgEl.textContent = "✓ Check your email for the reset link (also check spam).";
      msgEl.className = 'msg success';
      submitBtn.textContent = 'Send reset email';
      submitBtn.disabled = false;
      return;
    }

    // ── Sign in / Sign up ──
    if (!email || !email.includes('@')) {
      msgEl.textContent = 'Enter a valid email.';
      msgEl.className = 'msg error';
      return;
    }
    if (!password || password.length < 6) {
      msgEl.textContent = 'Password must be at least 6 characters.';
      msgEl.className = 'msg error';
      return;
    }
    submitBtn.disabled = true;
    const originalLabel = submitBtn.textContent;
    submitBtn.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';
    msgEl.textContent = '';
    msgEl.className = 'msg';

    let res;
    if (mode === 'signin') {
      res = await supabase.auth.signInWithPassword({ email, password });
    } else {
      res = await supabase.auth.signUp({ email, password });
    }

    if (res.error) {
      msgEl.textContent = res.error.message || 'Something went wrong.';
      msgEl.className = 'msg error';
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
      return;
    }

    if (mode === 'signup' && !res.data.session) {
      msgEl.textContent = '✓ Account created. Check your email to confirm, then sign in.';
      msgEl.className = 'msg success';
      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;
      mode = 'signin';
      refreshUI();
      return;
    }

    msgEl.textContent = '✓ Signed in. Loading…';
    msgEl.className = 'msg success';
    setTimeout(() => window.location.replace('dashboard.html'), 200);
  }

  submitBtn.addEventListener('click', submit);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  emailInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // In reset mode there's no password field, so submit directly.
      if (mode === 'reset') submit();
      else passInput.focus();
    }
  });
</script>
</body>
</html>
